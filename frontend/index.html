<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape Box — Admin Portal</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/[email protected]/build/qrcode.min.js"></script>
</head>
<body>

<div id="app">

  <!-- ─── LOGIN ─── -->
  <div id="login-screen">
    <form class="login-card" id="login-form" onsubmit="return false;">
      <div class="login-header">
        <div class="login-eyebrow">Classified — Admin Terminal</div>
        <div class="login-title">Escape Box</div>
        <div class="login-stamp">Restricted Access</div>
      </div>
      <div class="login-body">
        <div class="field">
          <label class="field-label" for="login-email">Epost</label>
          <input id="login-email" type="email" autocomplete="username" required>
        </div>
        <div class="field">
          <label class="field-label" for="login-password">Passord</label>
          <input id="login-password" type="password" autocomplete="current-password" required>
        </div>
        <div id="login-error" class="form-error hidden"></div>
        <button class="btn btn-block" id="login-btn" type="submit">▶ Logg inn</button>
        <div class="text-center muted" style="font-size:12px;margin-top:4px;">
          Glemt passord? Kontakt din administrator.
        </div>
      </div>
    </form>
  </div>

  <!-- ─── HEADER ─── -->
  <div id="header" class="hidden">
    <div class="header-title">
      <span class="header-eyebrow" id="header-eyebrow">Admin Terminal</span>
      <span class="header-main">ESCAPE BOX</span>
    </div>
    <div class="header-right">
      <span class="conn-dot" id="ws-dot" title="WebSocket"></span>
      <div class="header-user">
        <span class="header-user-name" id="header-user-name">—</span>
        <span class="header-user-meta" id="header-user-meta">—</span>
      </div>
      <span class="role-badge" id="header-role">—</span>
      <button class="btn btn-sm btn-ghost" onclick="logout()">Logg ut</button>
    </div>
  </div>

  <!-- ─── MAIN ─── -->
  <div id="main" class="hidden">

    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="nav-section">Oversikt</div>
      <div class="nav-item active" data-view="dashboard"><span class="nav-icon">▣</span> Dashboard</div>
      <div class="nav-item" data-view="events"><span class="nav-icon">▤</span> Events</div>
      <div class="nav-item" data-view="live"><span class="nav-icon">●</span> Live</div>

      <div class="nav-section">Innhold</div>
      <div class="nav-item" data-view="scenarios" data-roles="superadmin"><span class="nav-icon">◆</span> Scenarier</div>

      <div class="nav-section">Administrasjon</div>
      <div class="nav-item" data-view="organizations" data-roles="superadmin"><span class="nav-icon">◫</span> Bedrifter</div>
      <div class="nav-item" data-view="users" data-roles="superadmin,org_admin"><span class="nav-icon">◍</span> Brukere</div>
      <div class="nav-item" data-view="profile"><span class="nav-icon">◐</span> Min profil</div>
    </nav>

    <!-- Content area: each view is a hidden section, swapped by router -->
    <main id="content">
      <section class="view" data-view="dashboard"></section>
      <section class="view hidden" data-view="events"></section>
      <section class="view hidden" data-view="live"></section>
      <section class="view hidden" data-view="scenarios"></section>
      <section class="view hidden" data-view="organizations"></section>
      <section class="view hidden" data-view="users"></section>
      <section class="view hidden" data-view="profile"></section>
    </main>
  </div>

</div>

<!-- ─── MODAL CONTAINER ─── -->
<div id="modal-overlay" class="modal-overlay" onclick="closeModalOnBackdrop(event)">
  <div class="modal" id="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Modal</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- ─── TOAST ─── -->
<div id="toast-container"></div>

<!-- App config — endre API_BASE etter deploy -->
<script>
window.APP_CONFIG = {
  API_BASE: 'https://escape-box-backend-production.up.railway.app',
  WS_URL:   'wss://escape-box-backend-production.up.railway.app/ws'
};
</script>
<script src="app.js"></script>

</body>
</html>

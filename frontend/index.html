<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Escape Box</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #0a0e14;
    --bg-elev: #131923;
    --bg-card: #1a212d;
    --border: #2a3441;
    --text: #e8eef5;
    --text-dim: #8a98a8;
    --accent: #ff4444;
    --accent-2: #ffb84d;
    --success: #4ade80;
    --warning: #fbbf24;
    --danger: #ef4444;
    --info: #4dabf7;
    --glow: 0 0 20px rgba(255, 68, 68, 0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(255, 68, 68, 0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(255, 184, 77, 0.06) 0%, transparent 50%);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .logo {
    font-family: 'Major Mono Display', monospace;
    font-size: 28px;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
  }
  .logo span { color: var(--accent); }

  .user-info {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .user-info strong { color: var(--text); }

  .ws-status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .ws-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
  }
  .ws-dot.connected { background: var(--success); box-shadow: 0 0 8px var(--success); }
  .ws-dot.error { background: var(--danger); }

  /* Cards */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-family: 'Major Mono Display', monospace;
    font-size: 18px;
    letter-spacing: 3px;
    margin-bottom: 16px;
    color: var(--accent-2);
  }
  .card h3 {
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    color: var(--text-dim);
  }

  /* Forms */
  label {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  input, select, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    font-family: inherit;
    font-size: 14px;
    margin-bottom: 14px;
  }
  textarea {
    min-height: 80px;
    resize: vertical;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  button.btn {
    background: var(--accent);
    border: none;
    color: white;
    padding: 12px 24px;
    font-family: inherit;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  button.btn:hover { background: #ff6666; box-shadow: var(--glow); }
  button.btn:disabled { background: var(--border); cursor: not-allowed; }
  button.btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
  button.btn.secondary:hover { border-color: var(--accent); }
  button.btn.success { background: var(--success); color: var(--bg); }
  button.btn.danger { background: var(--danger); }
  button.btn.info { background: var(--info); }
  button.btn.small { padding: 6px 12px; font-size: 11px; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; }
  th, td {
    padding: 12px 8px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  th {
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  tr:hover td { background: rgba(255, 255, 255, 0.02); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .badge.role-superadmin { background: rgba(204, 93, 232, 0.2); color: #cc5de8; }
  .badge.role-org_admin { background: rgba(77, 171, 247, 0.2); color: var(--info); }
  .badge.role-gamemaster { background: rgba(255, 184, 77, 0.2); color: var(--accent-2); }
  .badge.role-participant { background: rgba(74, 222, 128, 0.2); color: var(--success); }
  .badge.status-planned { background: rgba(138, 152, 168, 0.2); color: var(--text-dim); }
  .badge.status-live { background: rgba(74, 222, 128, 0.2); color: var(--success); }
  .badge.status-finished { background: rgba(255, 184, 77, 0.2); color: var(--accent-2); }
  .badge.status-active { background: rgba(74, 222, 128, 0.2); color: var(--success); }
  .badge.status-completed { background: rgba(255, 184, 77, 0.2); color: var(--accent-2); }
  .badge.status-failed { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg-card);
    border: 1px solid var(--accent);
    padding: 16px 20px;
    box-shadow: var(--glow);
    z-index: 100;
    animation: slideIn 0.3s ease-out;
    max-width: 400px;
  }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } }

  .hidden { display: none !important; }

  .row { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; }
  .row > * { flex: 1; min-width: 140px; }

  /* Login screen */
  .login-container {
    max-width: 480px;
    margin: 80px auto;
  }
  .login-container .card {
    padding: 40px;
  }

  /* Code display */
  .code-display {
    font-family: 'Major Mono Display', monospace;
    font-size: 32px;
    letter-spacing: 8px;
    text-align: center;
    padding: 16px;
    background: var(--bg);
    border: 1px solid var(--accent);
    color: var(--accent-2);
  }

  /* Team grid */
  .team-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .team-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    padding: 16px;
  }
  .team-card .team-name {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .team-card .team-meta {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .team-card .team-code {
    font-family: 'Major Mono Display', monospace;
    font-size: 20px;
    letter-spacing: 3px;
    color: var(--accent-2);
    margin: 8px 0;
  }
  .team-card .team-pin {
    font-family: 'Major Mono Display', monospace;
    font-size: 16px;
    letter-spacing: 4px;
    color: var(--info);
  }
  .qr-code {
    background: white;
    padding: 12px;
    margin: 12px 0;
    display: inline-block;
  }

  /* Modal */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.8);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 32px;
    max-width: 600px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-close {
    float: right;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 24px;
    cursor: pointer;
  }

  /* Stat cards */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
  }
  .stat {
    text-align: center;
    padding: 16px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
  }
  .stat .num {
    font-family: 'Major Mono Display', monospace;
    font-size: 36px;
    color: var(--accent-2);
  }
  .stat .label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  /* Timer / play screen */
  .timer {
    font-family: 'Major Mono Display', monospace;
    font-size: 84px;
    text-align: center;
    letter-spacing: 6px;
    padding: 32px;
    color: var(--accent-2);
    text-shadow: 0 0 30px rgba(255, 184, 77, 0.4);
  }
  .timer.warning { color: var(--warning); animation: pulse 1s infinite; }
  .timer.danger { color: var(--danger); animation: pulse 0.5s infinite; }
  @keyframes pulse { 50% { opacity: 0.6; } }

  /* Nav-tabs inside views */
  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .tabs button {
    background: none;
    border: none;
    color: var(--text-dim);
    padding: 12px 20px;
    font-family: inherit;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tabs button.active {
    color: var(--accent-2);
    border-bottom-color: var(--accent);
  }
  .tabs button:hover { color: var(--text); }

  .empty {
    text-align: center;
    color: var(--text-dim);
    padding: 32px;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo" onclick="goHome()">Escape<span>::</span>Box</div>
    <div class="user-info" id="user-info"></div>
    <div class="ws-status">
      <span class="ws-dot" id="ws-dot"></span>
      <span id="ws-status-text">Tilkobler...</span>
    </div>
  </header>

  <main id="main"></main>
</div>

<div id="toast" class="toast hidden"></div>

<script>
  // ============================================================
  //  KONFIG
  // ============================================================
  const API_URL = window.location.hostname === 'localhost'
    ? 'http://localhost:3000'
    : 'https://escape-box-production.up.railway.app';
  const WS_URL = API_URL.replace(/^http/, 'ws') + '/ws';

  // ============================================================
  //  STATE
  // ============================================================
  let state = {
    user: null,
    token: localStorage.getItem('eb_token'),
    team: null,
    activeSession: null,
    timerInterval: null,
    ws: null,
    wsReconnectTimer: null,
    currentView: 'login',
    currentTab: null,
    data: {}, // cache for views
  };

  // Forsøk å hente bruker fra localStorage
  try {
    const cached = localStorage.getItem('eb_user');
    if (cached) state.user = JSON.parse(cached);
  } catch {}

  // ============================================================
  //  HELPERS
  // ============================================================
  const $ = (id) => document.getElementById(id);
  const fmt = (sec) => {
    if (sec == null) return '--:--';
    const m = Math.floor(sec / 60), s = sec % 60;
    return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  };
  const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));

  function toast(msg, type = 'info') {
    const t = $('toast');
    t.textContent = msg;
    t.classList.remove('hidden');
    t.style.borderColor = type === 'error' ? 'var(--danger)' : 'var(--accent)';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.add('hidden'), 3500);
  }

  async function api(path, opts = {}) {
    const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
    if (state.token) headers.Authorization = 'Bearer ' + state.token;
    const res = await fetch(API_URL + path, { ...opts, headers });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return data;
  }

  // ============================================================
  //  WEBSOCKET
  // ============================================================
  function connectWS() {
    if (state.ws?.readyState === WebSocket.OPEN) return;
    try { state.ws = new WebSocket(WS_URL); } catch { return; }

    state.ws.onopen = () => {
      $('ws-dot').classList.add('connected');
      $('ws-dot').classList.remove('error');
      $('ws-status-text').textContent = 'Live';
    };
    state.ws.onclose = () => {
      $('ws-dot').classList.remove('connected');
      $('ws-status-text').textContent = 'Frakoblet';
      clearTimeout(state.wsReconnectTimer);
      state.wsReconnectTimer = setTimeout(connectWS, 3000);
    };
    state.ws.onerror = () => $('ws-dot').classList.add('error');
    state.ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        handleWSMessage(msg);
      } catch {}
    };
  }

  function handleWSMessage(msg) {
    // For nå: bare oppdater event-detaljer hvis vi ser på et event
    if (state.currentView === 'event-detail' && state.data.eventId) {
      if (['session_started', 'session_event', 'session_finished'].includes(msg.type)) {
        loadEventDetail(state.data.eventId, true); // soft-refresh
      }
    }
  }

  // ============================================================
  //  AUTH
  // ============================================================
  async function login(email, password) {
    const res = await api('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email, password }),
    });
    state.token = res.token;
    state.user = res.user;
    localStorage.setItem('eb_token', res.token);
    localStorage.setItem('eb_user', JSON.stringify(res.user));
    return res;
  }

  function logout() {
    state.token = null;
    state.user = null;
    state.team = null;
    localStorage.removeItem('eb_token');
    localStorage.removeItem('eb_user');
    localStorage.removeItem('eb_team');
    goHome();
  }

  function goHome() {
    if (state.user) {
      switch (state.user.role) {
        case 'superadmin': return showSuperadmin();
        case 'org_admin': return showOrgAdmin();
        case 'gamemaster': return showOrgAdmin(); // foreløpig samme view
        default: return showLogin();
      }
    }
    showLogin();
  }

  // ============================================================
  //  USER INFO HEADER
  // ============================================================
  function renderUserInfo() {
    const el = $('user-info');
    if (!state.user) {
      el.innerHTML = '';
      return;
    }
    const roleLabel = {
      superadmin: 'Superadmin',
      org_admin: 'Bedriftsadmin',
      gamemaster: 'GameMaster',
    }[state.user.role] || state.user.role;
    const orgPart = state.user.organization_name
      ? ` · ${escapeHtml(state.user.organization_name)}`
      : '';
    el.innerHTML = `
      <span><strong>${escapeHtml(state.user.name)}</strong> · ${roleLabel}${orgPart}</span>
      <button class="btn small secondary" onclick="showAccount()">Min konto</button>
      <button class="btn small secondary" onclick="logout()">Logg ut</button>
    `;
  }

  // ============================================================
  //  LOGIN VIEW
  // ============================================================
  function showLogin() {
    state.currentView = 'login';
    renderUserInfo();
    $('main').innerHTML = `
      <div class="login-container">
        <div class="card">
          <h2>Logg inn</h2>
          <label>Epost</label>
          <input id="login-email" type="email" autocomplete="email" />
          <label>Passord</label>
          <input id="login-password" type="password" autocomplete="current-password" />
          <button class="btn" onclick="handleLogin()" style="width:100%">Logg inn</button>
        </div>
        <div style="text-align:center; margin-top:24px; color:var(--text-dim); font-size:12px;">
          Er du deltager? <a href="#" onclick="showTeamLogin(); return false;" style="color:var(--accent-2)">Bli med i et lag</a>
        </div>
      </div>
    `;
    setTimeout(() => $('login-email')?.focus(), 100);
    // Enter for å sende
    ['login-email', 'login-password'].forEach(id => {
      $(id)?.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
      });
    });
  }

  async function handleLogin() {
    try {
      const email = $('login-email').value.trim();
      const password = $('login-password').value;
      if (!email || !password) return toast('Fyll inn epost og passord', 'error');
      await login(email, password);
      toast(`Velkommen, ${state.user.name}!`);
      goHome();
    } catch (e) { toast(e.message, 'error'); }
  }

  // ============================================================
  //  TEAM LOGIN VIEW (deltagere)
  // ============================================================
  function showTeamLogin() {
    state.currentView = 'team-login';
    renderUserInfo();

    // Sjekk om vi har URL-parametre fra QR-kode (?event=ABC&team=XYZ)
    const params = new URLSearchParams(window.location.search);
    const eventCode = params.get('event') || '';
    const teamCode = params.get('team') || '';

    $('main').innerHTML = `
      <div class="login-container">
        <div class="card">
          <h2>Bli med</h2>
          <label>Eventkode</label>
          <input id="tl-event" placeholder="ABCDE" value="${escapeHtml(eventCode)}"
            style="text-transform:uppercase" maxlength="10" />
          <label>Lagkode</label>
          <input id="tl-team" placeholder="XYZ1" value="${escapeHtml(teamCode)}"
            style="text-transform:uppercase" maxlength="10" />
          <label>PIN (4 siffer)</label>
          <input id="tl-pin" inputmode="numeric" maxlength="4" placeholder="••••" />
          <button class="btn" onclick="handleTeamLogin()" style="width:100%">Bli med</button>
        </div>
        <div style="text-align:center; margin-top:24px; color:var(--text-dim); font-size:12px;">
          <a href="#" onclick="showLogin(); return false;" style="color:var(--accent-2)">← Tilbake til vanlig login</a>
        </div>
      </div>
    `;
    setTimeout(() => {
      const target = !eventCode ? 'tl-event' : !teamCode ? 'tl-team' : 'tl-pin';
      $(target)?.focus();
    }, 100);
  }

  async function handleTeamLogin() {
    try {
      const event_code = $('tl-event').value.trim().toUpperCase();
      const team_code = $('tl-team').value.trim().toUpperCase();
      const pin = $('tl-pin').value.trim();
      if (!event_code || !team_code || !pin) return toast('Fyll inn alle feltene', 'error');

      const res = await api('/api/auth/team-login', {
        method: 'POST',
        body: JSON.stringify({ event_code, team_code, pin }),
      });
      state.team = res.team;
      localStorage.setItem('eb_team', JSON.stringify(res.team));
      toast(`Velkommen, ${res.team.name}!`);
      showTeamPlay();
    } catch (e) { toast(e.message, 'error'); }
  }

  // ============================================================
  //  TEAM PLAY VIEW (deltagere)
  // ============================================================
  function showTeamPlay() {
    state.currentView = 'team-play';
    renderUserInfo();
    const t = state.team;
    $('main').innerHTML = `
      <div class="card">
        <h2 style="color:${escapeHtml(t.color)}">${escapeHtml(t.name)}</h2>
        <p style="color:var(--text-dim); margin-bottom:16px;">
          ${escapeHtml(t.event_name)} · ${escapeHtml(t.scenario_name || 'Ukjent scenario')}
        </p>
        <div id="team-play-content"></div>
      </div>
    `;
    renderTeamPlayState();
  }

  async function renderTeamPlayState() {
    const t = state.team;
    const c = $('team-play-content');
    if (!c) return;

    // Sjekk om sesjon allerede pågår
    try {
      const session = await api(`/api/sessions/active/${t.id}`);
      state.activeSession = session;
      renderActiveGame();
    } catch {
      // Ingen aktiv sesjon — vis "Klar?"
      if (t.event_status === 'live') {
        c.innerHTML = `
          <p style="margin-bottom:16px;">Eventet er i gang! Klikk start for å begynne.</p>
          <button class="btn success" onclick="startTeamGame()">Start spill</button>
        `;
      } else if (t.event_status === 'finished') {
        c.innerHTML = `<p>Eventet er avsluttet.</p>`;
      } else {
        c.innerHTML = `
          <p>Vent på at GameMaster starter eventet.</p>
          <p style="color:var(--text-dim); margin-top:8px; font-size:12px;">
            Status: ${escapeHtml(t.event_status)}
          </p>
        `;
      }
    }
  }

  async function startTeamGame() {
    try {
      const session = await api('/api/sessions/start', {
        method: 'POST',
        body: JSON.stringify({ team_id: state.team.id }),
      });
      state.activeSession = session;
      renderActiveGame();
      toast('Spill startet!');
    } catch (e) { toast(e.message, 'error'); }
  }

  function renderActiveGame() {
    const c = $('team-play-content');
    c.innerHTML = `
      <div class="timer" id="play-timer">--:--</div>
      <div class="row" style="margin-top: 16px;">
        <button class="btn success" onclick="logTeamEvent('puzzle_solved')">Puzzle løst</button>
        <button class="btn secondary" onclick="logTeamEvent('hint_used')">Bruk hint</button>
        <button class="btn" onclick="finishTeamGame(true)">Fullført!</button>
        <button class="btn danger" onclick="finishTeamGame(false)">Avbryt</button>
      </div>
      <div style="margin-top: 24px; display:flex; gap:24px; justify-content: center;">
        <div class="stat" style="background:none; border:none;">
          <div class="num" id="play-puzzle">${state.activeSession.current_puzzle || 0}</div>
          <div class="label">Puzzle</div>
        </div>
        <div class="stat" style="background:none; border:none;">
          <div class="num" id="play-hints">${state.activeSession.hints_used || 0}</div>
          <div class="label">Hint brukt</div>
        </div>
      </div>
    `;
    startTimer();
  }

  function startTimer() {
    clearInterval(state.timerInterval);
    const startTime = new Date(state.activeSession.started_at).getTime();
    const limit = state.activeSession.time_limit_seconds;
    const tick = () => {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const remaining = Math.max(0, limit - elapsed);
      const el = $('play-timer');
      if (!el) { clearInterval(state.timerInterval); return; }
      el.textContent = fmt(remaining);
      el.classList.toggle('warning', remaining <= 600 && remaining > 60);
      el.classList.toggle('danger', remaining <= 60);
      if (remaining === 0) {
        clearInterval(state.timerInterval);
        finishTeamGame(false);
      }
    };
    tick();
    state.timerInterval = setInterval(tick, 1000);
  }

  async function logTeamEvent(type) {
    if (!state.activeSession) return;
    try {
      const res = await api(`/api/sessions/${state.activeSession.id}/event`, {
        method: 'POST',
        body: JSON.stringify({ puzzle_index: state.activeSession.current_puzzle, event_type: type }),
      });
      state.activeSession = res.session;
      $('play-puzzle').textContent = res.session.current_puzzle;
      $('play-hints').textContent = res.session.hints_used;
      toast(type === 'puzzle_solved' ? 'Puzzle løst!' : 'Hint brukt');
    } catch (e) { toast(e.message, 'error'); }
  }

  async function finishTeamGame(completed) {
    if (!state.activeSession) return;
    try {
      await api(`/api/sessions/${state.activeSession.id}/finish`, {
        method: 'POST',
        body: JSON.stringify({ completed }),
      });
      clearInterval(state.timerInterval);
      state.activeSession = null;
      $('team-play-content').innerHTML = completed
        ? `<h2 style="color:var(--success)">🎉 Gratulerer!</h2><p>Dere fullførte spillet!</p>`
        : `<p>Spill avsluttet.</p>`;
      toast(completed ? '🎉 Gratulerer!' : 'Spill avsluttet');
    } catch (e) { toast(e.message, 'error'); }
  }

    }[type] || '#8a98a8';

  async function saveCoordMeta() {
    try {
      const coord = state.data.scenario.scenario_data.coordinates[state.data.editingCoordIndex];
      const x = parseInt($('ce-x').value, 10);
      const y = parseInt($('ce-y').value, 10);
      const pointsVal = parseInt($('ce-points').value, 10);
      const code = $('ce-code').value.trim();
      const code_is_text = $('ce-code-type').value === 'text';
      if (isNaN(x) || isNaN(y)) return toast('X og Y må være tall', 'error');
      if (!code) return toast('Kode påkrevd', 'error');
      coord.x = x;
      coord.y = y;
      coord.points = isNaN(pointsVal) ? 0 : pointsVal;
      coord.code = code_is_text ? code : (parseInt(code, 10) || code);
      coord.code_is_text = code_is_text;
      await saveScenarioData();
      toast('Koordinat lagret');
    } catch (e) { toast(e.message, 'error'); }

          <button class="modal-close" onclick="closeCardEditor()">×</button>
          <h2 style="font-family: 'Major Mono Display', monospace; font-size: 18px; letter-spacing: 3px; margin-bottom: 24px; color: var(--accent-2);">Rediger kort</h2>
          <label>Tittel</label>
          <input id="card-title" value="${escapeHtml(card.title || '')}" placeholder="f.eks. Ledetråd 1" />
          <label>Type</label>
          <select id="card-type">
            <option value="info" ${card.type === 'info' ? 'selected' : ''}>Info (blå)</option>
            <option value="ledetraad" ${card.type === 'ledetraad' ? 'selected' : ''}>Ledetråd (gul)</option>
            <option value="fakta" ${card.type === 'fakta' ? 'selected' : ''}>Fakta (grønn)</option>
            <option value="advarsel" ${card.type === 'advarsel' ? 'selected' : ''}>Advarsel (oransje)</option>
            <option value="oppgave" ${card.type === 'oppgave' ? 'selected' : ''}>Oppgave (lilla)</option>
          </select>
          <label>Tekst (linjeskift bevares)</label>
          <textarea id="card-text" style="min-height:160px;">${escapeHtml(card.text || '')}</textarea>
          <button class="btn" onclick="saveCard()">Lagre kort</button>
        </div>
      </div>
    `);
    setTimeout(() => $('card-title')?.focus(), 100);
  }

  function closeCardEditor() {
    document.getElementById('card-editor-bg')?.remove();
    // Re-render coord editor med oppdaterte kort
    document.getElementById('coord-editor-bg')?.remove();
    showCoordinateEditor();
  }

  async function saveCard() {
    try {
      const coord = state.data.scenario.scenario_data.coordinates[state.data.editingCoordIndex];
      const card = coord.cards[state.data.editingCardIndex];
      card.title = $('card-title').value.trim();
      card.type = $('card-type').value;
      card.text = $('card-text').value;
      await saveScenarioData();
      toast('Kort lagret');
      closeCardEditor();
    } catch (e) { toast(e.message, 'error'); }
  }


  async function renderAllUsers() {
    const c = $('tab-content');
    c.innerHTML = `
      <div class="card">
        <h2>Alle brukere på plattformen</h2>
        <table id="users-table">
          <thead><tr><th>Navn</th><th>Epost</th><th>Rolle</th><th>Bedrift</th><th>Status</th><th></th></tr></thead>
          <tbody><tr><td colspan="6" class="empty">Laster...</td></tr></tbody>
        </table>
      </div>
    `;
    try {
      const users = await api('/api/users');
      const tbody = $('users-table').querySelector('tbody');
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">Ingen brukere</td></tr>';
      } else {
        tbody.innerHTML = users.map(u => `
          <tr>
            <td><strong>${escapeHtml(u.name)}</strong></td>
            <td>${escapeHtml(u.email)}</td>
            <td><span class="badge role-${u.role}">${u.role}</span></td>
            <td>${escapeHtml(u.organization_name || '—')}</td>
            <td>${u.active ? '✓' : '✗'}</td>
            <td>
              ${u.id !== state.user.id ? `<button class="btn small danger" onclick="deleteUser(${u.id})">Slett</button>` : ''}
            </td>
          </tr>
        `).join('');
      }
    } catch (e) { toast(e.message, 'error'); }
  }

  async function deleteUser(id) {
    if (!confirm('Slett bruker?')) return;
    try {
      await api('/api/users/' + id, { method: 'DELETE' });
      toast('Bruker slettet');
      renderAllUsers();
    } catch (e) { toast(e.message, 'error'); }
  }

  // ============================================================
  //  ORG ADMIN VIEW
  // ============================================================
  function showOrgAdmin() {
    state.currentView = 'org-admin';
    renderUserInfo();
    if (!state.currentTab) state.currentTab = 'events';
    $('main').innerHTML = `
      <div class="tabs">
        <button data-tab="events" class="${state.currentTab === 'events' ? 'active' : ''}">Eventer</button>
        ${state.user.role === 'org_admin' ? `<button data-tab="users" class="${state.currentTab === 'users' ? 'active' : ''}">Brukere</button>` : ''}
      </div>
      <div id="tab-content"></div>
    `;
    document.querySelectorAll('.tabs button').forEach(b => {
      b.addEventListener('click', () => {
        state.currentTab = b.dataset.tab;
        showOrgAdmin();
      });
    });
    if (state.currentTab === 'events') renderEvents();
    if (state.currentTab === 'users') renderOrgUsers();
  }

  async function renderEvents() {
    const c = $('tab-content');
    c.innerHTML = `
      <div class="card">
        <h2>Opprett event</h2>
        <div class="row">
          <div><label>Navn</label><input id="new-ev-name" placeholder="f.eks. Bedrifts-event 2026" /></div>
          <div>
            <label>Scenario</label>
            <select id="new-ev-scenario"><option>Laster...</option></select>
          </div>
          <div><label>Antall lag</label><input id="new-ev-teams" type="number" value="4" min="1" max="50" /></div>
          <div><label>Dato (valgfri)</label><input id="new-ev-date" type="datetime-local" /></div>
          <div style="flex:0;"><button class="btn" onclick="createNewEvent()">Opprett</button></div>
        </div>
      </div>
      <div class="card">
        <h2>Eventer</h2>
        <table id="events-table">
          <thead><tr><th>Navn</th><th>Kode</th><th>Scenario</th><th>Lag</th><th>Status</th><th></th></tr></thead>
          <tbody><tr><td colspan="6" class="empty">Laster...</td></tr></tbody>
        </table>
      </div>
    `;
    try {
      const [scenarios, events] = await Promise.all([
        api('/api/scenarios'),
        api('/api/events'),
      ]);
      const sel = $('new-ev-scenario');
      sel.innerHTML = scenarios.length
        ? scenarios.map(s => `<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('')
        : '<option value="">Ingen scenarier tilgjengelig</option>';

      const tbody = $('events-table').querySelector('tbody');
      if (events.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">Ingen eventer enda</td></tr>';
      } else {
        tbody.innerHTML = events.map(e => `
          <tr style="cursor:pointer" onclick="loadEventDetail(${e.id})">
            <td><strong>${escapeHtml(e.name)}</strong></td>
            <td><code style="color:var(--accent-2)">${escapeHtml(e.code)}</code></td>
            <td>${escapeHtml(e.scenario_name || '—')}</td>
            <td>${e.team_count}</td>
            <td><span class="badge status-${e.status}">${e.status}</span></td>
            <td><button class="btn small" onclick="event.stopPropagation(); loadEventDetail(${e.id})">Åpne</button></td>
          </tr>
        `).join('');
      }
    } catch (e) { toast(e.message, 'error'); }
  }

  async function createNewEvent() {
    try {
      const name = $('new-ev-name').value.trim();
      const scenario_id = parseInt($('new-ev-scenario').value, 10);
      const team_count = parseInt($('new-ev-teams').value, 10);
      const scheduled_at = $('new-ev-date').value || null;
      if (!name || !scenario_id || !team_count) return toast('Fyll inn alle påkrevde felt', 'error');
      const ev = await api('/api/events', {
        method: 'POST',
        body: JSON.stringify({ name, scenario_id, team_count, scheduled_at }),
      });
      toast(`Event opprettet: kode ${ev.code}`);
      $('new-ev-name').value = '';
      loadEventDetail(ev.id);
    } catch (e) { toast(e.message, 'error'); }
  }

  // ============================================================
  //  EVENT DETAIL VIEW
  // ============================================================
  async function loadEventDetail(eventId, soft = false) {
    state.currentView = 'event-detail';
    state.data.eventId = eventId;
    if (!soft) {
      $('main').innerHTML = '<div class="card empty">Laster event...</div>';
    }
    try {
      const ev = await api('/api/events/' + eventId);
      renderEventDetail(ev);
      // Subscribe via WebSocket
      if (state.ws?.readyState === WebSocket.OPEN) {
        state.ws.send(JSON.stringify({ type: 'subscribe', event_id: eventId }));
      }
    } catch (e) { toast(e.message, 'error'); }
  }

  function renderEventDetail(ev) {
    const baseUrl = window.location.origin + window.location.pathname;
    const teamsHtml = ev.teams.map(t => {
      const teamUrl = `${baseUrl}?event=${ev.code}&team=${t.code}`;
      return `
        <div class="team-card" style="border-left-color:${escapeHtml(t.color)}">
          <div class="team-name">${escapeHtml(t.name)}</div>
          <div class="team-meta">Status: ${t.session_status ? `<span class="badge status-${t.session_status}">${t.session_status}</span>` : '<span class="badge status-planned">venter</span>'}</div>
          <div class="team-code">${escapeHtml(t.code)}</div>
          <div class="team-pin">PIN: ${escapeHtml(t.pin)}</div>
          <div id="qr-${t.id}" class="qr-code"></div>
          <button class="btn small secondary" onclick="regeneratePin(${ev.id}, ${t.id})">Ny PIN</button>
        </div>
      `;
    }).join('');

    $('main').innerHTML = `
      <button class="btn small secondary" onclick="state.currentTab='events'; showOrgAdmin()" style="margin-bottom:16px;">← Tilbake</button>
      <div class="card">
        <h2>${escapeHtml(ev.name)}</h2>
        <p style="color:var(--text-dim); margin-bottom:8px;">
          ${escapeHtml(ev.scenario_name || '—')} · ${ev.teams.length} lag · <span class="badge status-${ev.status}">${ev.status}</span>
        </p>
        <p style="color:var(--text-dim); font-size:12px;">
          Eventkode: <strong style="color:var(--accent-2); font-size:18px; letter-spacing:3px;">${escapeHtml(ev.code)}</strong>
        </p>
        <div class="row" style="margin-top:16px;">
          ${ev.status === 'planned' ? `<button class="btn success" onclick="updateEventStatus(${ev.id}, 'live')">Start eventet</button>` : ''}
          ${ev.status === 'live' ? `<button class="btn" onclick="updateEventStatus(${ev.id}, 'finished')">Avslutt eventet</button>` : ''}
          ${ev.status === 'finished' ? `<button class="btn secondary" onclick="updateEventStatus(${ev.id}, 'planned')">Sett tilbake til planlagt</button>` : ''}
          <button class="btn danger small" onclick="deleteEvent(${ev.id})">Slett event</button>
        </div>
      </div>
      <div class="card">
        <h2>Lag og QR-koder</h2>
        <p style="color:var(--text-dim); font-size:12px; margin-bottom:16px;">
          Skriv ut eller vis QR-koden til hvert lag. PIN må deles separat (det er sikkerheten).
        </p>
        <div class="team-grid">${teamsHtml}</div>
      </div>
    `;

    // Generer QR-koder
    ev.teams.forEach(t => {
      const teamUrl = `${baseUrl}?event=${ev.code}&team=${t.code}`;
      const el = document.getElementById('qr-' + t.id);
      if (el) {
        el.innerHTML = '';
        new QRCode(el, { text: teamUrl, width: 140, height: 140 });
      }
    });
  }

  async function updateEventStatus(id, status) {
    try {
      await api('/api/events/' + id, {
        method: 'PATCH',
        body: JSON.stringify({ status }),
      });
      toast('Status oppdatert');
      loadEventDetail(id);
    } catch (e) { toast(e.message, 'error'); }
  }

  async function deleteEvent(id) {
    if (!confirm('Slett event? Alle lag og resultater forsvinner.')) return;
    try {
      await api('/api/events/' + id, { method: 'DELETE' });
      toast('Event slettet');
      state.currentTab = 'events';
      showOrgAdmin();
    } catch (e) { toast(e.message, 'error'); }
  }

  async function regeneratePin(eventId, teamId) {
    if (!confirm('Generer ny PIN for laget?')) return;
    try {
      await api(`/api/events/${eventId}/teams/${teamId}/regenerate-pin`, { method: 'POST' });
      toast('Ny PIN generert');
      loadEventDetail(eventId);
    } catch (e) { toast(e.message, 'error'); }
  }

  async function renderOrgUsers() {
    const c = $('tab-content');
    c.innerHTML = `
      <div class="card">
        <h2>Opprett bruker</h2>
        <div class="row">
          <div><label>Navn</label><input id="new-u-name" /></div>
          <div><label>Epost</label><input id="new-u-email" type="email" /></div>
          <div><label>Passord</label><input id="new-u-password" type="password" /></div>
          <div>
            <label>Rolle</label>
            <select id="new-u-role">
              <option value="gamemaster">GameMaster</option>
              <option value="org_admin">Bedriftsadmin</option>
            </select>
          </div>
          <div style="flex:0;"><button class="btn" onclick="createOrgUser()">Opprett</button></div>
        </div>
      </div>
      <div class="card">
        <h2>Brukere i bedriften</h2>
        <table id="org-users-table">
          <thead><tr><th>Navn</th><th>Epost</th><th>Rolle</th><th>Status</th><th></th></tr></thead>
          <tbody><tr><td colspan="5" class="empty">Laster...</td></tr></tbody>
        </table>
      </div>
    `;
    try {
      const users = await api('/api/users');
      const tbody = $('org-users-table').querySelector('tbody');
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty">Ingen brukere</td></tr>';
      } else {
        tbody.innerHTML = users.map(u => `
          <tr>
            <td><strong>${escapeHtml(u.name)}</strong></td>
            <td>${escapeHtml(u.email)}</td>
            <td><span class="badge role-${u.role}">${u.role}</span></td>
            <td>${u.active ? '✓' : '✗'}</td>
            <td>${u.id !== state.user.id ? `<button class="btn small danger" onclick="deleteUser(${u.id}); renderOrgUsers()">Slett</button>` : ''}</td>
          </tr>
        `).join('');
      }
    } catch (e) { toast(e.message, 'error'); }
  }

  async function createOrgUser() {
    try {
      const name = $('new-u-name').value.trim();
      const email = $('new-u-email').value.trim();
      const password = $('new-u-password').value;
      const role = $('new-u-role').value;
      if (!name || !email || !password) return toast('Fyll inn alle felt', 'error');
      await api('/api/users', {
        method: 'POST',
        body: JSON.stringify({ name, email, password, role }),
      });
      toast('Bruker opprettet');
      ['new-u-name', 'new-u-email', 'new-u-password'].forEach(id => $(id).value = '');
      renderOrgUsers();
    } catch (e) { toast(e.message, 'error'); }
  }

  // ============================================================
  //  ACCOUNT VIEW (alle innloggede brukere)
  // ============================================================
  function showAccount() {
    state.currentView = 'account';
    state.previousView = state.currentView;
    renderUserInfo();
    const u = state.user;
    $('main').innerHTML = `
      <button class="btn small secondary" onclick="goHome()" style="margin-bottom:16px;">← Tilbake</button>
      <div class="card" style="max-width: 600px;">
        <h2>Min profil</h2>
        <label>Navn</label>
        <input id="acc-name" value="${escapeHtml(u.name)}" />
        <label>Epost</label>
        <input id="acc-email" type="email" value="${escapeHtml(u.email)}" />
        <button class="btn" onclick="saveProfile()">Lagre profil</button>
      </div>

      <div class="card" style="max-width: 600px;">
        <h2>Bytt passord</h2>
        <label>Nåværende passord</label>
        <input id="acc-current-pw" type="password" autocomplete="current-password" />
        <label>Nytt passord (minst 6 tegn)</label>
        <input id="acc-new-pw" type="password" autocomplete="new-password" />
        <label>Bekreft nytt passord</label>
        <input id="acc-confirm-pw" type="password" autocomplete="new-password" />
        <button class="btn" onclick="changePassword()">Bytt passord</button>
      </div>

      <div class="card" style="max-width: 600px;">
        <h3>Om kontoen</h3>
        <p style="color:var(--text-dim); font-size:13px; line-height:1.6;">
          Rolle: <strong>${escapeHtml(state.user.role)}</strong><br>
          ${state.user.organization_name ? `Bedrift: <strong>${escapeHtml(state.user.organization_name)}</strong><br>` : ''}
          Bruker-ID: ${state.user.id}
        </p>
      </div>
    `;
  }

  async function saveProfile() {
    try {
      const name = $('acc-name').value.trim();
      const email = $('acc-email').value.trim();
      if (!name || !email) return toast('Navn og epost påkrevd', 'error');

      const res = await api('/api/auth/update-profile', {
        method: 'POST',
        body: JSON.stringify({ name, email }),
      });

      // Oppdater lokal state og token
      state.token = res.token;
      state.user = res.user;
      localStorage.setItem('eb_token', res.token);
      localStorage.setItem('eb_user', JSON.stringify(res.user));

      toast('Profil oppdatert');
      renderUserInfo();
      showAccount(); // re-render med nye verdier
    } catch (e) { toast(e.message, 'error'); }
  }

  async function changePassword() {
    try {
      const current = $('acc-current-pw').value;
      const newPw = $('acc-new-pw').value;
      const confirm = $('acc-confirm-pw').value;

      if (!current || !newPw) return toast('Fyll inn passord', 'error');
      if (newPw.length < 6) return toast('Nytt passord må være minst 6 tegn', 'error');
      if (newPw !== confirm) return toast('Passordene matcher ikke', 'error');

      await api('/api/auth/change-password', {
        method: 'POST',
        body: JSON.stringify({ current_password: current, new_password: newPw }),
      });

      // Tøm feltene
      ['acc-current-pw', 'acc-new-pw', 'acc-confirm-pw'].forEach(id => $(id).value = '');
      toast('Passord byttet');
    } catch (e) { toast(e.message, 'error'); }
  }

  // ============================================================
  //  INIT
  // ============================================================
  connectWS();

  // Sjekk URL-parametre — hvis ?event= eller ?team= → team-login
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.has('event') || urlParams.has('team')) {
    showTeamLogin();
  } else {
    // Sjekk om vi har lagret team-sesjon
    try {
      const cachedTeam = localStorage.getItem('eb_team');
      if (cachedTeam) state.team = JSON.parse(cachedTeam);
    } catch {}

    if (state.team) {
      showTeamPlay();
    } else if (state.user) {
      goHome();
    } else {
      showLogin();
    }
  }
</script>

</body>
</html>
